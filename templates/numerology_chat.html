<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অংক জ্যোতিষ AI চেট | ধ্ৰুৱতৰা AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF6600; --orange-dark: #E55D00; --deep-blue: #1a237e;
            --gold: #D4A017; --bg: #FFF8F0; --card-bg: #FFFFFF;
            --text: #2c3e50; --text-light: #5a6c7d; --border: #e8e0d5;
            --shadow: 0 4px 20px rgba(0,0,0,0.06); --radius: 14px; --radius-sm: 8px;
            --green: #2E7D32; --red: #C62828; --purple: #6A1B9A;
            --transition: 0.25s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Bengali', 'Arial', sans-serif;
            background: linear-gradient(135deg, #FFF8F0 0%, #FFF3E0 30%, #FFECB3 60%, #FFF8F0 100%);
            background-attachment: fixed; min-height: 100vh; color: var(--text);
        }

        .top-nav {
            background: white; border-bottom: 1px solid var(--border);
            padding: 12px 24px; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .top-nav .brand { font-weight: 800; font-size: 1.2rem; color: var(--purple); }
        .top-nav .brand span { color: var(--deep-blue); }
        .nav-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-sm {
            padding: 8px 16px; border-radius: 20px; font-size: 0.82rem;
            font-weight: 600; font-family: inherit; cursor: pointer;
            border: none; transition: var(--transition); text-decoration: none;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-outline { background: white; color: var(--orange); border: 2px solid var(--orange); }
        .btn-outline:hover { background: var(--orange); color: white; }
        .btn-fill { background: var(--purple); color: white; }
        .btn-fill:hover { background: #4A148C; transform: translateY(-1px); }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .chat-layout {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }
        @media (max-width: 768px) { .chat-layout { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg); border-radius: var(--radius);
            box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, var(--purple), #7B1FA2);
            color: white; padding: 14px 20px; font-weight: 700;
            font-size: 1rem; display: flex; align-items: center; gap: 8px;
        }
        .card-body { padding: 16px 20px; }

        /* Info */
        .numer-info { font-size: 0.82rem; line-height: 1.8; }
        .numer-info .ni-row {
            display: flex; justify-content: space-between;
            padding: 4px 0; border-bottom: 1px dotted #eee;
        }
        .numer-info .ni-label { color: var(--text-light); }
        .numer-info .ni-value { font-weight: 600; color: var(--deep-blue); }

        /* Question Select */
        .question-select-wrap { margin-bottom: 12px; }
        .question-select-wrap label {
            display: block; font-weight: 600; font-size: 0.85rem;
            color: var(--deep-blue); margin-bottom: 6px;
        }
        .question-select-wrap select {
            width: 100%; padding: 10px 14px; border: 2px solid var(--border);
            border-radius: var(--radius-sm); font-family: inherit;
            font-size: 0.9rem; background: white; cursor: pointer;
            outline: none; transition: var(--transition);
        }
        .question-select-wrap select:focus { border-color: var(--purple); }

        .btn-ask {
            width: 100%; padding: 12px; border-radius: 25px;
            font-size: 0.95rem; font-weight: 700; font-family: inherit;
            cursor: pointer; border: none; transition: var(--transition);
            background: linear-gradient(135deg, var(--purple), #7B1FA2);
            color: white; box-shadow: 0 4px 16px rgba(106,27,154,0.3);
            margin-bottom: 12px;
        }
        .btn-ask:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(106,27,154,0.4); }
        .btn-ask:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Chat Messages */
        .chat-messages { max-height: 500px; overflow-y: auto; padding: 8px 0; }
        .chat-msg { margin-bottom: 14px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-msg.user { text-align: right; }
        .chat-msg.user .msg-bubble {
            background: linear-gradient(135deg, var(--purple), #7B1FA2);
            color: white; display: inline-block; max-width: 85%;
            padding: 10px 16px; border-radius: 18px 18px 4px 18px;
            font-size: 0.85rem; text-align: left;
        }
        .chat-msg.ai .msg-bubble {
            background: var(--bg); border: 1px solid var(--border);
            display: inline-block; max-width: 90%;
            padding: 12px 16px; border-radius: 18px 18px 18px 4px;
            font-size: 0.85rem; line-height: 1.8; white-space: pre-line;
        }
        .chat-msg .msg-label {
            font-size: 0.7rem; color: var(--text-light); margin-bottom: 3px;
        }

        .typing-indicator {
            display: none; padding: 12px 16px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 18px; max-width: 100px;
        }
        .typing-indicator.show { display: inline-block; }
        .typing-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; background: var(--purple);
            margin: 0 2px; animation: bounce 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .empty-chat {
            text-align: center; padding: 40px 20px; color: var(--text-light);
        }
        .empty-chat .ec-icon { font-size: 3rem; margin-bottom: 10px; }
        .empty-chat .ec-text { font-size: 0.9rem; }

        .no-data {
            text-align: center; padding: 30px 20px;
            background: #FFF3E0; border-radius: var(--radius-sm);
            border: 1px solid #FFCC80;
        }
        .no-data .nd-icon { font-size: 2.5rem; margin-bottom: 8px; }
        .no-data .nd-text { font-size: 0.85rem; color: var(--text); margin-bottom: 12px; }

        /* Form */
        .mini-form { margin-bottom: 12px; }
        .mini-form input {
            width: 100%; padding: 8px 12px; border: 2px solid var(--border);
            border-radius: var(--radius-sm); font-family: inherit;
            font-size: 0.85rem; margin-bottom: 6px; outline: none;
        }
        .mini-form input:focus { border-color: var(--purple); }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="brand">💬 ধ্ৰুৱতৰা<span> AI</span> অংক জ্যোতিষ</div>
    <div class="nav-actions">
        <a href="/numerology" class="btn-sm btn-outline">🔢 অংক জ্যোতিষ</a>
        <a href="/dashboard" class="btn-sm btn-outline">📊 ডেশ্ববৰ্ড</a>
    </div>
</nav>

<div class="container">
    <div class="chat-layout">
        <!-- Left: Info + Question Selector -->
        <div>
            <div class="card" style="margin-bottom:16px;">
                <div class="card-header">📋 আপোনাৰ তথ্য</div>
                <div class="card-body">
                    <div id="numerInfo">
                        <div class="mini-form">
                            <input type="text" id="chatName" placeholder="আপোনাৰ নাম..." value="">
                            <input type="date" id="chatDob" value="">
                        </div>
                        <button class="btn-ask" id="btnLoad" onclick="loadNumerology()" style="background:linear-gradient(135deg,#1a237e,#283593);">
                            📊 অংক জ্যোতিষ ল'ড কৰক
                        </button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">❓ প্ৰশ্ন বাছনি কৰক</div>
                <div class="card-body">
                    <div class="question-select-wrap">
                        <label for="questionSelect">তলৰ প্ৰশ্নসমূহৰ পৰা এটা বাছনি কৰক:</label>
                        <select id="questionSelect" onchange="onQuestionSelect()">
                            <option value="">— প্ৰশ্ন বাছনি কৰক —</option>
                            {% for q in questions %}
                            <option value="{{ q.label }}">{{ q.label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button class="btn-ask" id="btnAsk" onclick="askQuestion()" disabled>
                        🤖 AI ক সুধক
                    </button>
                    <div style="font-size:0.72rem;color:var(--text-light);text-align:center;">
                        আপোনাৰ অংক জ্যোতিষৰ ভিত্তিত AI য়ে উত্তৰ দিব
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: Chat Messages -->
        <div>
            <div class="card">
                <div class="card-header">💬 AI অংক জ্যোতিষীৰ সৈতে কথা পাতক</div>
                <div class="card-body">
                    <div class="chat-messages" id="chatMessages">
                        <div class="empty-chat" id="emptyChat">
                            <div class="ec-icon">🤖</div>
                            <div class="ec-text">প্ৰথমে বাওঁফালৰ পৰা নাম আৰু জন্ম তাৰিখ দি "অংক জ্যোতিষ ল'ড কৰক" বুটাম ক্লিক কৰক।<br>তাৰ পিছত এটা প্ৰশ্ন বাছনি কৰি AI ক সুধক।</div>
                        </div>
                        <div class="typing-indicator" id="typingIndicator">
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                            <span class="typing-dot"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let numerReport = null;
let userName = '';
let userDob = '';

// Check URL params for pre-filled data
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('name')) {
    document.getElementById('chatName').value = urlParams.get('name');
}
if (urlParams.get('dob')) {
    document.getElementById('chatDob').value = urlParams.get('dob');
}

function onQuestionSelect() {
    const sel = document.getElementById('questionSelect');
    const btn = document.getElementById('btnAsk');
    btn.disabled = !sel.value || !numerReport;
}

async function loadNumerology() {
    const name = document.getElementById('chatName').value.trim();
    const dob = document.getElementById('chatDob').value;

    if (!name) { alert('অনুগ্ৰহ কৰি নাম লিখক।'); return; }
    if (!dob) { alert('অনুগ্ৰহ কৰি জন্ম তাৰিখ নিৰ্বাচন কৰক।'); return; }

    userName = name;
    userDob = dob;

    const btn = document.getElementById('btnLoad');
    btn.disabled = true;
    btn.textContent = '⏳ ল\'ড কৰি আছে...';

    const formData = new FormData();
    formData.append('name', name);
    formData.append('dob', dob);

    try {
        const resp = await fetch('/numerology/calculate', { method: 'POST', body: formData });
        const data = await resp.json();

        if (!data.success) {
            alert(data.message || 'গণনা ত্ৰুটি');
            return;
        }

        numerReport = data.report;
        document.getElementById('btnAsk').disabled = false;
        document.getElementById('emptyChat').innerHTML = `
            <div class="ec-icon">✅</div>
            <div class="ec-text">অংক জ্যোতিষ ল'ড হৈছে! এতিয়া এটা প্ৰশ্ন বাছনি কৰি AI ক সুধক।</div>
        `;

        // Update info display
        const m = numerReport.mulyanka;
        const b = numerReport.bhagyanka;
        const n = numerReport.namanka;
        document.getElementById('numerInfo').innerHTML = `
            <div class="numer-info">
                <div class="ni-row"><span class="ni-label">নাম</span><span class="ni-value">${name}</span></div>
                <div class="ni-row"><span class="ni-label">জন্ম তাৰিখ</span><span class="ni-value">${dob}</span></div>
                <div class="ni-row"><span class="ni-label">মূল্যাংক</span><span class="ni-value">${m.value} (${m.planet_short || ''})</span></div>
                <div class="ni-row"><span class="ni-label">ভাগ্যাংক</span><span class="ni-value">${b.value} (${b.planet_short || ''})</span></div>
                <div class="ni-row"><span class="ni-label">নামাংক</span><span class="ni-value">${n.value} (${n.planet_short || ''})</span></div>
                <div class="ni-row"><span class="ni-label">এঞ্জেল সংখ্যা</span><span class="ni-value">${numerReport.angel_number.value}</span></div>
            </div>
            <button class="btn-ask" id="btnLoad" onclick="loadNumerology()" style="background:linear-gradient(135deg,#1a237e,#283593);margin-top:10px;">
                🔄 পুনৰায় ল'ড কৰক
            </button>
        `;

    } catch (e) {
        alert('নেটৱৰ্ক ত্ৰুটি: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '📊 অংক জ্যোতিষ ল\'ড কৰক';
    }
}

async function askQuestion() {
    const sel = document.getElementById('questionSelect');
    const question = sel.value;
    if (!question) return;
    if (!numerReport) {
        alert('প্ৰথমে অংক জ্যোতিষ ল\'ড কৰক।');
        return;
    }

    const btn = document.getElementById('btnAsk');
    btn.disabled = true;
    btn.textContent = '⏳ চিন্তা কৰি আছে...';

    // Add user message
    addMessage('user', question);
    document.getElementById('emptyChat').style.display = 'none';

    // Show typing
    const typing = document.getElementById('typingIndicator');
    typing.classList.add('show');

    try {
        const resp = await fetch('/api/numerology/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                question: question,
                name: userName,
                dob: userDob
            })
        });
        const data = await resp.json();

        typing.classList.remove('show');

        if (data.success) {
            addMessage('ai', data.response);
        } else {
            addMessage('ai', '❌ ' + (data.message || 'ত্ৰুটি হৈছে।'));
        }
    } catch (e) {
        typing.classList.remove('show');
        addMessage('ai', '❌ নেটৱৰ্ক ত্ৰুটি: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '🤖 AI ক সুধক';
        sel.value = '';
    }
}

function addMessage(type, text) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'chat-msg ' + type;
    const label = type === 'user' ? 'আপুনি' : '🤖 AI জ্যোতিষী';
    div.innerHTML = `
        <div class="msg-label">${label}</div>
        <div class="msg-bubble">${text}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}
</script>

</body>
</html>
